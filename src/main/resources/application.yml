spring:
  application:
    name: room-management-system

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    url: jdbc:postgresql://localhost:5432/room_management?sslmode=disable
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123456}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  jackson:
    default-property-inclusion: non_null
    date-format: yyyy-MM-dd HH:mm:ss

server:
  port: 8080
  servlet:
    context-path: /

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics,env,beans,loggers,mappings,threaddump,heapdump,conditions
  endpoint:
    health:
      show-details: always
      show-components: always
    env:
      show-values: when-authorized
    loggers:
      enabled: true
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
    build:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    version: '@project.version@'
    description: Room Management System API

app:
  jwt:
    secret: ${APP_JWT_SECRET:cm9vbU1hbmFnZW1lbnRTZWNyZXRLZXlGb3JKV1RBdXRoZW50aWNhdGlvbjIwMjQ=}
    expiration: 86400
    refresh-expiration: 604800
  resource:
    auto-load:
      enabled: true
      fail-on-error: false
      update-existing: true
      default-resource-category: API_ENDPOINT
  upload:
    dir: ${APP_UPLOAD_DIR:uploads}
